    network.on("click", (params) => {

        detail.style.display = "none";

      const node = nodesById[nodeId];
      detail.style.display = "block";

        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
